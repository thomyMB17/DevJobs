spring:
  application:
    name: DevJobs

  datasource:
    url: jdbc:mysql://${BDDURL}:${BDDPORT}/${BDD}?useSSL=false&serverTimezone=UTC
    username: ${BDDUSER}
    password: ${BDDPASS}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jwt:
    secret: ${jwt.secret}
    expiration: ${jwt.expiration}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true